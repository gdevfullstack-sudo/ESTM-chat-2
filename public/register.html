<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESTIM Chat | Inscription</title>
    <link rel="stylesheet" href="register.css" />
  </head>
  <body data-page="register">
    <main class="auth-showcase">
      <section class="auth-showcase__visual">
        <div class="auth-showcase__brand">
          <img src="Ressource/Logo.jpeg" alt="Logo ESTIM Chat" class="auth-showcase__logo" />
          <span>ESTIM Chat</span>
        </div>

        <img
          class="auth-showcase__image"
          src="Ressource/background_register_login.jpg"
          alt="Illustration ESTIM Chat"
        />

        <div class="auth-showcase__quote">
          <p>"Concevez votre espace de discussion avec une présence visuelle plus élégante."</p>
          <strong>Équipe ESTIM Chat</strong>
          <span>Messagerie collaborative premium</span>
        </div>
      </section>

      <section class="auth-showcase__panel">
        <div class="auth-showcase__panel-inner">
          <header class="auth-showcase__header">
            <h1>Créez votre compte ESTIM Chat</h1>
            <p>Inscrivez-vous pour lancer vos conversations en quelques secondes.</p>
          </header>

          <form id="register-form" class="auth-showcase__form" novalidate>
            <label class="auth-showcase__field">
              <span>Nom complet</span>
              <input
                type="text"
                name="username"
                placeholder="Jean Dupont"
                autocomplete="name"
                required
              />
            </label>

            <label class="auth-showcase__field">
              <span>Email</span>
              <input
                type="email"
                name="email"
                placeholder="vous@estimchat.com"
                autocomplete="email"
                required
              />
            </label>

            <label class="auth-showcase__field">
              <span>Mot de passe</span>
              <input
                type="password"
                name="password"
                placeholder="Minimum 6 caractères"
                autocomplete="new-password"
                required
              />
            </label>

            <label class="auth-showcase__field">
              <span>Confirmation</span>
              <input
                type="password"
                name="confirmPassword"
                placeholder="Répétez votre mot de passe"
                autocomplete="new-password"
                required
              />
            </label>

            <label class="auth-showcase__terms">
              <input type="checkbox" name="terms" required />
              <span>
                J'accepte les <a href="#">conditions d'utilisation</a> et la
                <a href="#">politique de confidentialité</a>.
              </span>
            </label>

            <button type="submit" class="auth-showcase__submit">Créer mon compte</button>
          </form>
          <p class="auth-showcase__footer">
            Vous avez déjà un compte ? <a href="login.html">Connexion</a>
          </p>

          <p id="auth-message" class="message-box" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
  </body>
</html>
