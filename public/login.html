<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESTIM Chat | Connexion</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body data-page="login">
    <main class="auth-showcase">
      <section class="auth-showcase__visual">
        <div class="auth-showcase__brand">
          <img src="Ressource/Logo.jpeg" alt="Logo ESTIM Chat" class="auth-showcase__logo" />
          <span>ESTIM Chat</span>
        </div>

        <img
          class="auth-showcase__image"
          src="Ressource/background_register_login.jpg"
          alt="Illustration ESTIM Chat"
        />

        <div class="auth-showcase__quote">
          <p>"Une interface claire pour des échanges plus humains et plus fluides."</p>
          <strong>Équipe ESTIM Chat</strong>
          <span>Messagerie collaborative premium</span>
        </div>
      </section>

      <section class="auth-showcase__panel">
        <div class="auth-showcase__panel-inner">
          <header class="auth-showcase__header">
            <h1>Bon retour sur ESTIM Chat</h1>
            <p>Connectez-vous pour retrouver vos conversations en toute simplicite.</p>
          </header>

          <form id="login-form" class="auth-showcase__form" novalidate>
            <label class="auth-showcase__field">
              <span>Email</span>
              <input
                type="email"
                name="email"
                placeholder="vous@estimchat.com"
                autocomplete="email"
                required
              />
            </label>

            <label class="auth-showcase__field">
              <span>Mot de passe</span>
              <input
                type="password"
                name="password"
                placeholder="Votre mot de passe"
                autocomplete="current-password"
                required
              />
            </label>

            <div class="auth-showcase__row">
              <a href="#" class="auth-showcase__link">Mot de passe oublie ?</a>
              <label class="auth-showcase__remember">
                <span>Rester connecte</span>
                <input type="checkbox" checked />
                <span class="auth-showcase__toggle"></span>
              </label>
            </div>

            <button type="submit" class="auth-showcase__submit">Connexion</button>
          </form>
          <p class="auth-showcase__footer">
            Vous n'avez pas de compte ? <a href="register.html">Inscription</a>
          </p>

          <p id="auth-message" class="message-box" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
  </body>
</html>
