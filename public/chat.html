<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESTIM Chat | Discussion</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="chat">
    <main class="chat-layout chat-layout--secure">
      <aside class="sidebar sidebar--nav sidebar--chat">
        <div class="sidebar-brand">
          <div class="brand-badge brand-badge--sidebar">ESTIM CHAT</div>
          <p>The Midnight Conductor</p>
        </div>

        <a class="back-link back-link--chat" href="inbox.html">Back to inbox</a>
        <div id="chat-contact-card" class="chat-contact-card chat-contact-card--secure"></div>
        <div class="chat-sidebar-note">
          Cette conversation autorise le texte, les photos et les videos. Aucun appel vocal,
          appel video ou message vocal n'est disponible.
        </div>
      </aside>

      <section class="chat-panel chat-panel--secure">
        <header class="chat-header chat-header--secure">
          <div id="chat-header-user" class="chat-header__user chat-header__user--secure"></div>
          <div class="chat-header__meta">
            <div id="typing-indicator" class="typing-indicator"></div>
            <button class="chat-header__menu" type="button" aria-label="Options de conversation">
              •••
            </button>
          </div>
        </header>

        <div class="chat-day-separator">Today</div>
        <div id="message-list" class="message-list message-list--secure"></div>

        <form id="message-form" class="message-form message-form--secure">
          <label class="file-button file-button--secure" title="Envoyer une photo ou une video">
            <input id="message-media" type="file" accept="image/*,video/*" />
            <span>Attach</span>
          </label>
          <div class="message-compose">
            <textarea
              id="message-input"
              rows="1"
              placeholder="Type your message..."
              maxlength="2000"
            ></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-primary--send">Send</button>
        </form>
        <p class="chat-footer-note">End-to-end encrypted session</p>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
  </body>
</html>
