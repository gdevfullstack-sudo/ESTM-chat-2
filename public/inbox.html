<!DOCTYPE html>
<html class="light" lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ESTIM - Conversations</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link rel="stylesheet" href="style.css"/>

                    "surface-container": "#ededf2",
                    "surface-bright": "#f9f9fe",
                    "on-secondary-container": "#646464",
                    "primary-fixed-dim": "#e9c400",
                    "on-primary-fixed-variant": "#544600",
                    "error": "#ba1a1a",
                    "outline": "#7e775f",
                    "surface-dim": "#d9dade",
                    "surface-variant": "#e2e2e7",
                    "tertiary-fixed-dim": "#00dbe8",
                    "secondary-container": "#e2e2e2",
                    "on-secondary-fixed": "#1b1b1b",
                    "background": "#f9f9fe",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "secondary-fixed": "#e2e2e2",
                    "surface-container-high": "#e8e8ed",
                    "secondary": "#5e5e5e",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-container": "#705e00",
                    "on-surface": "#1a1c1f",
                    "primary-container": "#ffd700",
                    "on-error-container": "#93000a",
                    "on-primary-fixed": "#221b00",
                    "inverse-surface": "#2e3034",
                    "on-surface-variant": "#4d4732",
                    "secondary-fixed-dim": "#c6c6c6",
                    "inverse-on-surface": "#f0f0f5",
                    "primary-fixed": "#ffe16d",

                    "surface-tint": "#705d00",
                    "on-tertiary-fixed-variant": "#004f54",
                    "on-background": "#1a1c1f",
                    "on-secondary-fixed-variant": "#474747",
                    "surface-container-highest": "#e2e2e7",
                    "tertiary-fixed": "#79f5ff",
                    "error-container": "#ffdad6",
                    "surface": "#f9f9fe",
                    "on-tertiary-container": "#006a70",
                    "on-tertiary-fixed": "#002022",

            "borderRadius": {

        },

<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .conversation-item, .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            border-radius: 16px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .conversation-item:hover, .contact-item:hover {
            background: #f3f3f8;
        }
        .conversation-meta, .contact-meta {
            flex: 1;
            min-width: 0;
            display: grid;
            gap: 2px;
        }
        .conversation-meta strong, .contact-meta strong {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.95rem;
            color: #1a1c1f;
        }
        .conversation-meta span, .contact-meta span {
            color: #5e5e5e;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .conversation-side {
            display: grid;
            gap: 4px;
            justify-items: end;
        }
        .message-time {
            font-size: 0.75rem;
            color: #5e5e5e;
        }
        .conversation-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            border-radius: 999px;
            background: #ffd700;
            color: #1a1c1f;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .conversation-badge:empty { display: none; }
        .avatar {
            position: relative;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background: linear-gradient(135deg, rgba(255,215,0,0.24), rgba(255,255,255,0.08));
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .status-dot {
            position: absolute;
            right: 2px;
            bottom: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #fff;
            background: #545454;
        }
        .status-dot.online { background: #1fd16f; }
        .message-box {
            min-height: 24px;
            color: #5e5e5e;
            text-align: center;
            font-size: 14px;
        }
        .message-box.is-error { color: #ba1a1a; }
        @media (max-width: 980px) {
            .sidebar-nav { display: none; }
        }
    </style>
</head>
<body class="bg-background text-on-background" data-page="inbox">

<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 h-16 z-50 bg-white border-b border-zinc-100 flex items-center justify-between px-6 w-full">
<div class="flex items-center gap-4">
<span class="text-2xl font-black tracking-tighter text-black">ESTIM</span>
<div class="hidden md:flex items-center bg-surface-container-low px-4 py-2 rounded-full w-96">
<span class="material-symbols-outlined text-zinc-400 mr-2">search</span>
<input id="contact-search" class="bg-transparent border-none focus:ring-0 text-body-sm w-full outline-none" placeholder="Rechercher une conversation..." type="text"/>
</div>
</div>
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-zinc-50 rounded-full transition-all">
<span class="material-symbols-outlined text-zinc-500">notifications</span>
</button>
<button class="p-2 hover:bg-zinc-50 rounded-full transition-all">
<span class="material-symbols-outlined text-zinc-500">help</span>
</button>
<img alt="Profil" class="w-8 h-8 rounded-full border border-zinc-200" id="current-user-avatar-top" src="https://ui-avatars.com/api/?name=User&background=FFD700&color=0f0f0f"/>
</div>
</header>

<div class="flex h-screen pt-16 overflow-hidden">
<!-- SideNavBar -->
<aside class="sidebar-nav hidden md:flex flex-col gap-1 w-64 h-full fixed left-0 top-0 pt-20 border-r border-zinc-100 bg-white text-sm font-medium">
<div class="px-6 mb-8">
<div class="flex items-center gap-3 mb-1">
<div class="w-10 h-10 rounded-full flex items-center justify-center overflow-hidden shrink-0 shadow-sm border border-zinc-100">
<img src="Ressource/Logo.jpeg" alt="Logo ESTIM" class="w-full h-full object-cover">
</div>
<div>
<h2 class="text-xl font-bold text-black leading-tight">ESTIM Chat</h2>
<p class="text-zinc-500 text-[10px] uppercase tracking-wider">Messagerie</p>
</div>
</div>
</div>
<nav class="flex-grow space-y-1">
<a href="inbox.html" class="flex items-center gap-3 px-4 py-3 bg-yellow-400 text-black rounded-lg mx-2 cursor-pointer transition-colors no-underline">
<span class="material-symbols-outlined">chat</span>
<span>Messages</span>
</a>
<a href="profile.html" class="flex items-center gap-3 px-4 py-3 text-zinc-600 hover:bg-zinc-50 rounded-lg mx-2 cursor-pointer transition-colors no-underline">
<span class="material-symbols-outlined">person</span>
<span>Profil</span>
</a>
</nav>
<div class="p-4">
<a href="inbox.html" class="w-full py-3 bg-yellow-400 text-black font-bold rounded-full flex items-center justify-center gap-2 hover:bg-yellow-500 transition-colors no-underline">
<span class="material-symbols-outlined">add</span>
Nouveau message
</a>
</div>
</aside>

<!-- Main Content -->
<main class="ml-0 md:ml-64 flex w-full h-full overflow-hidden">
<!-- Conversations List -->
<section class="w-full md:w-80 border-r border-zinc-100 flex-shrink-0 bg-white flex flex-col">
<div class="p-4 border-b border-zinc-50 flex items-center justify-between">
<h3 class="font-headline-md text-on-surface">Boîte de réception</h3>
<span id="global-unread-badge" class="conversation-badge"></span>
</div>
<div class="overflow-y-auto flex-grow p-2">
<div id="conversation-list" class="space-y-1"></div>
</div>
<div class="p-4 border-t border-zinc-50">
<div class="text-label-sm text-secondary uppercase tracking-wider mb-2">Nouvelle discussion</div>
<form id="contact-search-form" class="flex gap-2 mb-3">
<input type="text" id="contact-search-input" placeholder="ID (ex: ES123)" class="w-full text-sm border-zinc-200 bg-surface-container-low rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-primary-container" autocomplete="off"/>
<button type="submit" class="bg-primary-container text-primary px-3 rounded-lg flex items-center justify-center hover:brightness-105 transition-all">
<span class="material-symbols-outlined text-sm font-bold">search</span>
</button>
</form>
<div id="contact-list" class="space-y-1"></div>
</div>
</section>

<!-- Empty State -->
<section class="hidden md:flex flex-grow flex-col items-center justify-center bg-surface-bright p-8">
<div class="text-center max-w-md">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center mx-auto mb-6">
<span class="material-symbols-outlined text-primary text-3xl">chat</span>
</div>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2">Choisissez une discussion</h2>
<p class="font-body-lg text-body-lg text-secondary">
Ouvrez une conversation pour envoyer du texte, des photos ou des vidéos dans une session sécurisée.
</p>
</div>
</section>
</main>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
